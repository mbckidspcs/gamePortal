<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameVault - Indie Publishing Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
        }

        .game-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .game-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.5), 0 8px 10px -6px rgb(0 0 0 / 0.5);
            border-color: #3b82f6;
        }

        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .profile-ring {
            padding: 2px;
            background: linear-gradient(to right, #3b82f6, #8b5cf6);
            border-radius: 9999px;
        }
    </style>
</head>
<body class="min-h-screen overflow-x-hidden">

    <!-- Header -->
    <header class="sticky top-0 z-50 glass-panel px-6 py-3 flex justify-between items-center">
        <div class="flex items-center space-x-2 cursor-pointer" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">
            <div class="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center shadow-lg shadow-blue-500/20">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21 16-4-4-4 4"/><path d="M17 12v9"/><path d="M10 3 6 7l-4-4"/><path d="M6 7v12"/><path d="M20 9V7a2 2 0 0 0-2-2h-3"/><path d="M4 15v2a2 2 0 0 0 2 2h3"/></svg>
            </div>
            <h1 class="text-2xl font-extrabold tracking-tight uppercase hidden sm:block">Game<span class="text-blue-500">Vault</span></h1>
        </div>

        <div class="flex items-center space-x-6">
            <span id="game-count-badge" class="bg-slate-800 text-slate-400 text-xs px-3 py-1 rounded-full border border-slate-700 hidden md:inline-block">0 Games Available</span>
            
            <!-- Global Player Profile Section -->
            <div class="flex items-center space-x-4 border-l border-slate-700 pl-6">
                <div class="text-right hidden sm:block">
                    <p class="text-sm font-bold leading-none">Alex Storm</p>
                    <p class="text-[10px] text-blue-400 font-mono tracking-widest uppercase mt-1">Admin</p>
                </div>
                
                <div class="relative cursor-pointer group">
                    <div class="profile-ring group-hover:scale-105 transition-transform">
                        <img src="https://i.pravatar.cc/150?u=admin" alt="Profile" class="w-10 h-10 rounded-full border-2 border-slate-900 object-cover">
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content Area -->
    <main id="main-content" class="container mx-auto px-6 py-12">
        <section class="mb-12 text-center md:text-left">
            <h2 class="text-4xl md:text-5xl font-black mb-4 tracking-tight">Game Library</h2>
            <p class="text-slate-400 text-lg text-balance">Explore unique creations from developers around the world.</p>
        </section>

        <!-- Game Grid -->
        <div id="game-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
            <!-- Populated by JavaScript -->
        </div>
    </main>

    <script>
        /**
         * GAME LIST CONFIGURATION
         * folder: the directory name inside your 'games' folder
         * This script will look for:
         * 1. games/[folder]/thumbnail.png (Background image)
         * 2. games/[folder]/dev.png (Developer profile picture)
         * 3. games/[folder]/index.html (The game itself)
         */
        const GAME_LIST = [
            {
                id: 'neon-runner',
                title: 'Neon Runner',
                description: 'A high-speed synthwave avoidance game.',
                folder: 'neon-runner', 
                category: 'Arcade',
                color: '#ec4899',
                developer: 'CyberByte'
            },
            {
                id: 'pixel-quest',
                title: 'Pixel Quest',
                description: 'Classic 8-bit RPG adventure.',
                folder: 'pixel-quest',
                category: 'Adventure',
                color: '#22c55e',
                developer: 'RetroMage'
            },
            {
                id: 'void-racer',
                title: 'Void Racer',
                description: 'Cosmic racing simulator in deep space.',
                folder: 'void-racer',
                category: 'Racing',
                color: '#9333ea',
                developer: 'StarShip_X'
            }
        ];

        const BASE_PATH = 'games';

        function renderGames() {
            const grid = document.getElementById('game-grid');
            const badge = document.getElementById('game-count-badge');
            
            badge.innerText = `${GAME_LIST.length} Games Available`;
            
            grid.innerHTML = GAME_LIST.map(game => {
                const thumbPath = `${BASE_PATH}/${game.folder}/thumbnail.png`;
                const devPhotoPath = `${BASE_PATH}/${game.folder}/dev.png`;
                
                return `
                <div class="game-card glass-panel rounded-2xl overflow-hidden cursor-pointer group flex flex-col border border-slate-800" onclick="launchGame('${game.id}')">
                    <!-- Game Thumbnail -->
                    <div class="relative h-48 overflow-hidden bg-slate-800">
                        <img src="${thumbPath}" 
                             alt="${game.title}" 
                             onerror="this.src='https://images.unsplash.com/photo-1550745165-9bc0b252726f?w=800'"
                             class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700">
                        <div class="absolute inset-0 bg-gradient-to-t from-slate-900 via-slate-900/20 to-transparent"></div>
                        
                        <!-- Category Tag -->
                        <div class="absolute bottom-3 left-4 flex items-center space-x-2">
                            <div class="w-2 h-2 rounded-full" style="background-color: ${game.color}"></div>
                            <span class="text-[10px] uppercase font-bold tracking-widest text-white/90">${game.category}</span>
                        </div>
                    </div>

                    <!-- Card Body -->
                    <div class="p-5 flex-grow flex flex-col">
                        <!-- Dev Profile & Title -->
                        <div class="flex items-center space-x-3 mb-3">
                            <img src="${devPhotoPath}" 
                                 alt="${game.developer}" 
                                 onerror="this.src='https://i.pravatar.cc/150?u=${game.developer}'"
                                 class="w-10 h-10 rounded-full border border-slate-700 object-cover shadow-sm bg-slate-900">
                            <div class="overflow-hidden">
                                <h3 class="text-lg font-bold group-hover:text-blue-400 transition-colors uppercase tracking-tight truncate">${game.title}</h3>
                                <p class="text-[10px] text-slate-500 font-mono -mt-1 uppercase truncate">By ${game.developer}</p>
                            </div>
                        </div>

                        <p class="text-slate-400 text-sm leading-relaxed mb-6 flex-grow line-clamp-2">
                            ${game.description}
                        </p>

                        <!-- Footer -->
                        <div class="pt-4 border-t border-slate-800 flex items-center justify-between">
                            <span class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Launch App</span>
                            <div class="bg-blue-600/10 text-blue-500 p-2 rounded-lg group-hover:bg-blue-600 group-hover:text-white transition-all">
                                <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" />
                                </svg>
                            </div>
                        </div>
                    </div>
                </div>
            `}).join('');
        }

        function launchGame(gameId) {
            const game = GAME_LIST.find(g => g.id === gameId);
            if (!game) return;
            const gamePath = `${BASE_PATH}/${game.folder}/index.html`;
            window.open(gamePath, '_blank');
        }

        document.addEventListener('DOMContentLoaded', renderGames);
    </script>
</body>
</html>
