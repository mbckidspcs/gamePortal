<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D පියාසර කරන රථය - Flying Kindness Racer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #000; }
        canvas { display: block; }

        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            z-index: 100;
            pointer-events: none;
        }

        .stat {
            background: rgba(0,0,0,0.7);
            padding: 12px 25px;
            margin-bottom: 10px;
            border-radius: 4px;
            border-left: 6px solid #3498db;
            font-size: 20px;
            font-weight: bold;
            text-transform: uppercase;
        }

        #overlay {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle, rgba(44,62,80,0.9) 0%, rgba(0,0,0,0.95) 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            z-index: 200;
            text-align: center;
            padding: 20px;
        }

        h1 { font-size: 3rem; margin-bottom: 10px; color: #3498db; text-shadow: 0 0 20px rgba(52,152,219,0.5); }

        button {
            padding: 18px 50px;
            font-size: 22px;
            background: #27ae60;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 30px;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover { background: #2ecc71; transform: scale(1.05); }

        #speed-tag {
            position: absolute;
            bottom: 30px;
            right: 30px;
            color: #3498db;
            font-size: 24px;
            font-weight: bold;
            background: rgba(0,0,0,0.5);
            padding: 10px;
            border-radius: 50%;
            width: 80px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 4px solid #3498db;
        }

        #mobile-controls {
            position: absolute;
            bottom: 40px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-around;
            padding: 0 20px;
            z-index: 150;
        }

        .ctrl-btn {
            width: 70px;
            height: 70px;
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.5);
            border-radius: 50%;
            color: white;
            font-size: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            touch-action: none;
        }

        #flyBtn { background: rgba(52, 152, 219, 0.4); border-color: #3498db; }
    </style>
</head>
<body>

    <div id="ui">
        <div class="stat">පින් (Score): <span id="score">0</span></div>
        <div class="stat">ජීවිත (Lives): <span id="energy">3</span></div>
        <div class="stat" id="mode-text">ගොඩබිම (Driving)</div>
    </div>

    <div id="speed-tag">00</div>

    <div id="overlay">
        <h1>FLYING RACER 3D</h1>
        <p style="max-width: 500px; line-height: 1.6;">දැන් ඔබට පියාසර කළ හැකියි! <br> <b>Space Bar</b> හෝ <b>FLY</b> බොත්තම භාවිතා කර අහසට නගින්න.</p>
        <button onclick="startGame()">තරඟය අරඹන්න</button>
    </div>

    <div id="mobile-controls">
        <div class="ctrl-btn" id="leftBtn">◀</div>
        <div class="ctrl-btn" id="flyBtn">FLY</div>
        <div class="ctrl-btn" id="rightBtn">▶</div>
    </div>

    <script>
        let scene, camera, renderer, car, road;
        let score = 0, lives = 3, gameActive = false;
        let entities = [];
        let moveLeft = false, moveRight = false, isFlying = false;
        let carX = 0, carY = 0.6;
        let worldSpeed = 0.5;

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050510); 
            scene.fog = new THREE.Fog(0x050510, 20, 100);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 8, 15);
            camera.lookAt(0, 2, -5);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            const ambient = new THREE.AmbientLight(0xffffff, 0.4);
            scene.add(ambient);
            const directional = new THREE.DirectionalLight(0xffffff, 1.2);
            directional.position.set(10, 30, 10);
            directional.castShadow = true;
            scene.add(directional);

            // Road
            const roadGeo = new THREE.PlaneGeometry(12, 2000);
            const roadMat = new THREE.MeshPhongMaterial({ color: 0x111111 });
            road = new THREE.Mesh(roadGeo, roadMat);
            road.rotation.x = -Math.PI / 2;
            road.receiveShadow = true;
            scene.add(road);

            // Car Design
            const carGroup = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(1.8, 0.6, 4), new THREE.MeshPhongMaterial({ color: 0x3498db }));
            body.castShadow = true;
            carGroup.add(body);

            const cockpit = new THREE.Mesh(new THREE.BoxGeometry(1.4, 0.5, 1.5), new THREE.MeshPhongMaterial({ color: 0x222222, transparent: true, opacity: 0.8 }));
            cockpit.position.set(0, 0.5, 0);
            carGroup.add(cockpit);

            // Wings (Will expand when flying)
            const wingGeo = new THREE.BoxGeometry(2, 0.1, 1.5);
            const wingMat = new THREE.MeshPhongMaterial({ color: 0x2980b9 });
            const leftWing = new THREE.Mesh(wingGeo, wingMat);
            leftWing.position.set(-1.5, 0, 0);
            leftWing.name = "leftWing";
            carGroup.add(leftWing);

            const rightWing = new THREE.Mesh(wingGeo, wingMat);
            rightWing.position.set(1.5, 0, 0);
            rightWing.name = "rightWing";
            carGroup.add(rightWing);

            car = carGroup;
            car.position.y = 0.6;
            scene.add(car);

            for(let i=0; i<80; i++) createCity(i);

            window.addEventListener('resize', onResize);
            bindInput();
        }

        function createCity(i) {
            const h = 5 + Math.random() * 30;
            const b = new THREE.Mesh(new THREE.BoxGeometry(6, h, 6), new THREE.MeshPhongMaterial({ color: 0x1a1a2e }));
            b.position.set(i % 2 === 0 ? -15 : 15, h/2, -i * 15);
            scene.add(b);
        }

        function bindInput() {
            window.addEventListener('keydown', (e) => {
                if(e.key === "ArrowLeft") moveLeft = true;
                if(e.key === "ArrowRight") moveRight = true;
                if(e.code === "Space") isFlying = true;
            });
            window.addEventListener('keyup', (e) => {
                if(e.key === "ArrowLeft") moveLeft = false;
                if(e.key === "ArrowRight") moveRight = false;
                if(e.code === "Space") isFlying = false;
            });

            document.getElementById('leftBtn').onpointerdown = () => moveLeft = true;
            document.getElementById('leftBtn').onpointerup = () => moveLeft = false;
            document.getElementById('rightBtn').onpointerdown = () => moveRight = true;
            document.getElementById('rightBtn').onpointerup = () => moveRight = false;
            document.getElementById('flyBtn').onpointerdown = () => isFlying = true;
            document.getElementById('flyBtn').onpointerup = () => isFlying = false;
        }

        function createChild() {
            const g = new THREE.Group();
            const head = new THREE.Mesh(new THREE.SphereGeometry(0.3), new THREE.MeshPhongMaterial({color: 0xffdbac}));
            head.position.y = 1.5;
            const body = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.8, 0.3), new THREE.MeshPhongMaterial({color: 0xe67e22}));
            body.position.y = 0.9;
            g.add(head, body);
            return g;
        }

        function spawn() {
            if(!gameActive) return;
            const roll = Math.random();
            let mesh, type;

            if(roll > 0.6) {
                mesh = createChild();
                mesh.position.y = 0;
                type = "help";
            } else if(roll > 0.3) {
                // Enemy Car
                mesh = new THREE.Mesh(new THREE.BoxGeometry(2, 1.2, 3.5), new THREE.MeshPhongMaterial({ color: 0xc0392b }));
                mesh.position.y = 0.6;
                type = "danger";
            } else {
                // High bonus crystal
                mesh = new THREE.Mesh(new THREE.OctahedronGeometry(0.8), new THREE.MeshPhongMaterial({ color: 0x00f2ff, emissive: 0x00f2ff }));
                mesh.position.y = 6 + Math.random() * 5;
                type = "bonus";
            }

            mesh.position.x = (Math.random() - 0.5) * 10;
            mesh.position.z = -120;
            mesh.userData.type = type;
            scene.add(mesh);
            entities.push(mesh);

            setTimeout(spawn, Math.max(1000 - (score/20), 300));
        }

        function startGame() {
            gameActive = true;
            score = 0; lives = 3; worldSpeed = 0.6;
            document.getElementById('overlay').style.display = 'none';
            spawn();
            loop();
        }

        function loop() {
            if(!gameActive) return;
            requestAnimationFrame(loop);

            // Left-Right Movement
            if(moveLeft && carX > -5.5) carX -= 0.2;
            if(moveRight && carX < 5.5) carX += 0.2;
            car.position.x = carX;
            car.rotation.z = (moveLeft ? 0.15 : (moveRight ? -0.15 : 0));

            // Flying Logic
            const targetY = isFlying ? 8 : 0.6;
            carY += (targetY - carY) * 0.05;
            car.position.y = carY;
            
            // Wing animation
            const wingScale = isFlying ? 1.5 : 0.5;
            car.getObjectByName("leftWing").scale.x += (wingScale - car.getObjectByName("leftWing").scale.x) * 0.1;
            car.getObjectByName("rightWing").scale.x += (wingScale - car.getObjectByName("rightWing").scale.x) * 0.1;

            document.getElementById('mode-text').innerText = isFlying ? "අහසේ (Flying)" : "ගොඩබිම (Driving)";
            document.getElementById('mode-text').style.borderColor = isFlying ? "#3498db" : "#f1c40f";

            worldSpeed += 0.0001;
            document.getElementById('speed-tag').innerText = Math.floor(worldSpeed * 100);

            for(let i = entities.length - 1; i >= 0; i--) {
                let e = entities[i];
                e.position.z += worldSpeed;

                if(car.position.distanceTo(e.position) < 3) {
                    if(e.userData.type === "help" || e.userData.type === "bonus") {
                        score += (e.userData.type === "bonus" ? 300 : 150);
                        document.getElementById('score').innerText = score;
                    } else {
                        lives--;
                        document.getElementById('energy').innerText = lives;
                        if(lives <= 0) gameOver();
                    }
                    scene.remove(e);
                    entities.splice(i, 1);
                    continue;
                }

                if(e.position.z > 20) {
                    scene.remove(e);
                    entities.splice(i, 1);
                }
            }

            renderer.render(scene, camera);
        }

        function gameOver() {
            gameActive = false;
            document.getElementById('overlay').style.display = 'flex';
            document.getElementById('overlay').innerHTML = `
                <h1 style="color:#e74c3c">අනතුරක් සිදු විය!</h1>
                <p>ඔබේ ලකුණු: ${score}</p>
                <button onclick="location.reload()">නැවත උත්සාහ කරන්න</button>
            `;
        }

        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        window.onload = init;
    </script>
</body>
</html>
